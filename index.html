<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>
    <title>dictionary-app</title>
  </head>
  <body>
    <main class="dictionary-app">
      <header class="dictionary-app__header">
        <iconify-icon
          class="dictionary-app__logo"
          icon="material-symbols:book-3-outline"
          width="36"
          height="36"
          style="color: #000"
        ></iconify-icon>
        <div class="dictionary-app__header-controls">
          <div class="dictionary-app__font-picker">
            <button class="dictionary-app__font-trigger" type="button">
              Sans Serif<iconify-icon
                class="dictionary-app__font-trigger-icon"
                icon="material-symbols:keyboard-arrow-down-rounded"
                width="36"
                height="36"
                style="color: #000"
              ></iconify-icon>
            </button>
            <ul class="dictionary-app__font-menu">
              <li class="dictionary-app__font-menu-item">Sans Serif</li>
              <li class="dictionary-app__font-menu-item">Mono</li>
              <li class="dictionary-app__font-menu-item">Serif</li>
            </ul>
          </div>
          <div class="dictionary-app__theme-switch">
            <button
              class="dictionary-app__theme-toggle"
              type="button"
              aria-label="Toggle dark theme"
              aria-pressed="false"
            >
              <span class="dictionary-app__theme-toggle-track">
                <span class="dictionary-app__theme-toggle-thumb"></span>
              </span>
            </button>
            <iconify-icon
              class="dictionary-app__theme-icon"
              icon="material-symbols:moon-stars-outline-rounded"
              width="28"
              height="28"
              style="color: #000"
            ></iconify-icon>
          </div>
        </div>
      </header>
      <section class="dictionary-app__search">
        <input
          class="dictionary-app__search-input"
          type="text"
          spellcheck="false"
          aria-label="Search for a word"
        />
        <button>
          <iconify-icon
            class="dictionary-app__search-icon"
            icon="material-symbols:search-rounded"
            width="26"
            height="26"
            style="color: #000"
          ></iconify-icon>
        </button>
      </section>
      <section class="dictionary-app__entry"></section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
